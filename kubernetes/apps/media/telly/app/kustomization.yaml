---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
configMapGenerator:
  - name: telly-configmap
    files:
      - telly.config.toml=./resources/telly.config.toml
generatorOptions:
  disableNameSuffixHash: true
