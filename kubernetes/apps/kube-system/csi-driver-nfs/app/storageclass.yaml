---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-vols
provisioner: nfs.csi.k8s.io
parameters:
  server: 192.168.100.63
  share: /mnt/data/rook
reclaimPolicy: Delete
volumeBindingMode: Immediate
mountOptions: ["hard", "noatime"]
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-storage
provisioner: nfs.csi.k8s.io
parameters:
  server: 192.168.100.63
  share: /mnt/data/share
reclaimPolicy: Delete
volumeBindingMode: Immediate
mountOptions: ["hard", "noatime"]
