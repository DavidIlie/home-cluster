---
apiVersion: v1
kind: Service
metadata:
  name: &app proxmox
  namespace: networking
  labels:
    app.kubernetes.io/name: *app
    app.kubernetes.io/instance: *app
spec:
  type: ExternalName
  externalName: 192.168.100.56
  ports:
    - name: http
      port: &port 8006
      protocol: TCP
      targetPort: *port
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proxmox
spec:
  ingressClassName: internal
  rules:
    - host: &host nucleus.davidapps.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: proxmox
                port:
                  number: 80
  tls:
    - hosts: [*host]
