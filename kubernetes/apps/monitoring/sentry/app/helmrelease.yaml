---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: sentry
  namespace: monitoring
spec:
  interval: 1m
  chart:
    spec:
      chart: sentry
      version: 25.2.2
      sourceRef:
        kind: HelmRepository
        name: sentry
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 0
  upgrade:
    remediation:
      retries: 0
  values:
    user:
      create: true
      username: "david@davidapps.dev"
      existingSecret: sentry-secret
      existingSecretKey: password
      # this is required on the first installation, as sentry has to be initialized first
      # recommended to set false for updating the helm chart afterwards,
      # as you will have some downtime on each update if it's a hook
      # deploys relay & snuba consumers as post hooks
      asHook: true
    sentry:
      existingSecret: sentry-secret
      existingSecretKey: sentry-secret-key
    system:
      url: "https://sentry.davidapps.dev"
      adminEmail: "david@davidapps.dev"
      public: true
    sourcemaps:
      enabled: true
    symbolicator:
      enabled: false
    auth:
      register: false
    nginx:
      enabled: false
    ingress:
      enabled: true
      hostname: &host "sentry.davidapps.dev"
      annotations:
        kubernetes.io/ingress.class: "external"
        external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
      tls:
        - hosts:
            - *host
    filestore:
      filesystem:
        persistence:
          enabled: true
          existingClaim: sentry-filestore-rwx
          accessMode: ReadWriteOnce
    postgresql:
      enabled: false
    externalPostgresql:
      existingSecret: sentry-secret
      existingSecretKeys:
        password: DB_password
        username: DB_username
        database: DB_database
        port: DB_port
        host: DB_host
    redis:
      enabled: false
    externalRedis:
      host: "dragonfly.database.svc.cluster.local"
      port: 6379
    clickhouse:
      enabled: false
    externalClickhouse:
      host: "clickhouse.database.svc.cluster.local"
      tcpPort: 9000
      httpPort: 8123
      username: default
      password: ""
      database: sentry
      singleNode: true
    rabbitmq:
      enabled: false
    zookeeper:
      enabled: false
    kafka:
      zookeeper:
        enabled: false
      kraft:
        enabled: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false
