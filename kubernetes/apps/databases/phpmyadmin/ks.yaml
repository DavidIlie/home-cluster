---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: cluster-apps-phpmyadmin
  namespace: flux-system
spec:
  dependsOn:
    - name: cluster-apps-mariadb
  path: ./kubernetes/apps/databases/phpmyadmin/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  interval: 15m
  retryInterval: 1m
  timeout: 30s
