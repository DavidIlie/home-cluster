---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clickhouse
spec:
  chart:
    spec:
      chart: clickhouse
      version: "0.3.1"
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: pascaliske
        namespace: flux-system
  values:
    image:
      repository: clickhouse/clickhouse-server
      tag: 24.8.3.59-alpine
    env:
      - name: TZ
        value: Europe/Bucharest
    # LEARN how to automatically create the databases
    configMap:
      files:
        create-databases.sql: |
          CREATE DATABASE IF NOT EXISTS sentry;
          CREATE DATABASE IF NOT EXISTS plausible;
    persistentVolumeClaim:
      size: "5Gi"
  interval: 10m0s
