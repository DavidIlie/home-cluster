---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app posthog-mcp
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      posthog-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/davidilie/posthog-mcp
              tag: latest@sha256:bcfc6a650bee0c721b1ce84cf04b3abf7b61dc59c90fa4a59bcc04e2a37c574d
              pullPolicy: IfNotPresent
            # Override the image CMD so we can inject --var flags. Vars declared
            # in wrangler.jsonc outrank container env, so MCP_APPS_BASE_URL has
            # to come through wrangler's CLI to actually take effect.
            args:
              - pnpm
              - exec
              - wrangler
              - dev
              - --ip
              - 0.0.0.0
              - --port
              - "8787"
              - --persist-to
              - /data
              - --no-show-interactive-dev-session
              - --var
              - MCP_APPS_BASE_URL:https://posthog-mcp.davidhome.ro
            env:
              # Self-hosted PostHog API endpoint the MCP server proxies to.
              POSTHOG_API_BASE_URL: https://posthog.davidhome.ro
              # Public URL of this MCP service — used for CSP + UI app asset URLs.
              MCP_APPS_BASE_URL: https://posthog-mcp.davidhome.ro
              # Disable wrangler telemetry & analytics ingestion (we don't need self-tracking).
              WRANGLER_SEND_METRICS: "false"
              POSTHOG_MCP_APPS_ANALYTICS_BASE_URL: https://posthog.davidhome.ro
              TZ: Europe/Bucharest
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 8787
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 60
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      imagePullSecrets:
        - name: docker-regcred
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: posthog-mcp
        ports:
          http:
            port: *port
    ingress:
      app:
        className: internal
        annotations:
          gatus.home-operations.com/endpoint: |-
            name: PostHog MCP
            group: Monitoring
            url: https://posthog-mcp.davidhome.ro
            interval: 1m
            conditions: ["[STATUS] == 200", "[STATUS] == 404", "[STATUS] == 405"]
          # MCP streams SSE — disable proxy buffering and bump timeouts.
          nginx.ingress.kubernetes.io/proxy-buffering: "off"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        hosts:
          - host: &host posthog-mcp.davidhome.ro
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts: [*host]
    persistence:
      data:
        # Durable Object SQLite state (sessions, MCP server state) lives here.
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        storageClass: openebs-hostpath
        globalMounts:
          - path: /data
