---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: posthog-clickhouse
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  driftDetection:
    mode: enabled
  values:
    controllers:
      clickhouse:
        type: statefulset
        containers:
          app:
            image:
              repository: clickhouse/clickhouse-server
              tag: 26.3.17.56-alpine@sha256:1d8f5b3febaf81be475cc0fe8bf71acdc09e90ffcf1d8c8e291674d4f13c29bd
              pullPolicy: IfNotPresent
            env:
              KAFKA_HOSTS: posthog-redpanda.observability.svc.cluster.local:9092
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 8123
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
            securityContext:
              privileged: true
            ports:
              - name: http
                containerPort: 8123
                protocol: TCP
              - name: tcp
                containerPort: 9000
                protocol: TCP
              - name: interserver
                containerPort: 9009
                protocol: TCP
              - name: keeper
                containerPort: 9181
                protocol: TCP
              - name: keeper-raft
                containerPort: 9234
                protocol: TCP
              - name: metrics
                containerPort: 9363
                protocol: TCP
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                memory: 6Gi
    persistence:
      event-data:
        enabled: true
        type: hostPath
        hostPath: /var/mnt/mdadm-analytics-storage/posthog/event-data
        hostPathType: DirectoryOrCreate
        globalMounts:
          - path: /var/lib/clickhouse
      event-logs:
        enabled: true
        type: hostPath
        hostPath: /var/mnt/mdadm-analytics-storage/posthog/event-logs
        hostPathType: DirectoryOrCreate
        globalMounts:
          - path: /var/log/clickhouse-server
      users-config:
        enabled: true
        type: configMap
        name: posthog-clickhouse-users
        globalMounts:
          - path: /etc/clickhouse-server/users.d/users.xml
            subPath: users.xml
            readOnly: true
      server-config:
        enabled: true
        type: configMap
        name: posthog-clickhouse-config
        globalMounts:
          - path: /etc/clickhouse-server/config.d/default.xml
            subPath: default.xml
            readOnly: true
          - path: /etc/clickhouse-server/config.d/prometheus.xml
            subPath: prometheus.xml
            readOnly: true
      keeper-config:
        enabled: true
        type: configMap
        name: posthog-clickhouse-keeper
        globalMounts:
          - path: /etc/clickhouse-server/config.d/keeper.xml
            subPath: keeper.xml
            readOnly: true
    service:
      clickhouse:
        controller: clickhouse
        clusterIP: None
        ports:
          http:
            port: 8123
          tcp:
            port: 9000
          metrics:
            port: 9363
    serviceMonitor:
      clickhouse:
        serviceName: posthog-clickhouse
        endpoints:
          - port: metrics
            path: /metrics
            interval: 1m
