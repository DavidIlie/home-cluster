---
apiVersion: v1
kind: ConfigMap
metadata:
  name: posthog-clickhouse-config
  namespace: observability
data:
  default.xml: |
    <?xml version="1.0"?>
    <clickhouse>
      <tcp_port>9000</tcp_port>
      <remote_servers replace="replace">
        <posthog>
          <shard>
            <replica>
              <host>posthog-clickhouse-0.posthog-clickhouse.observability.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
        </posthog>
        <posthog_single_shard>
          <shard>
            <replica>
              <host>posthog-clickhouse-0.posthog-clickhouse.observability.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
        </posthog_single_shard>
        <posthog_migrations>
          <shard>
            <replica>
              <host>posthog-clickhouse-0.posthog-clickhouse.observability.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
        </posthog_migrations>
        <posthog_writable>
          <shard>
            <replica>
              <host>posthog-clickhouse-0.posthog-clickhouse.observability.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
        </posthog_writable>
        <posthog_primary_replica>
          <shard>
            <replica>
              <host>posthog-clickhouse-0.posthog-clickhouse.observability.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
        </posthog_primary_replica>
        <ai_events>
          <shard>
            <replica>
              <host>posthog-clickhouse-0.posthog-clickhouse.observability.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
        </ai_events>
        <aux>
          <shard>
            <replica>
              <host>posthog-clickhouse-0.posthog-clickhouse.observability.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
        </aux>
        <ops>
          <shard>
            <replica>
              <host>posthog-clickhouse-0.posthog-clickhouse.observability.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
        </ops>
        <sessions>
          <shard>
            <replica>
              <host>posthog-clickhouse-0.posthog-clickhouse.observability.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
        </sessions>
      </remote_servers>
      <named_collections>
        <msk_cluster>
          <kafka_broker_list from_env="KAFKA_HOSTS"/>
        </msk_cluster>
      </named_collections>
      <macros>
        <shard>01</shard>
        <replica>ch1</replica>
        <hostClusterType>online</hostClusterType>
        <hostClusterRole>data</hostClusterRole>
      </macros>
    </clickhouse>
  prometheus.xml: |
    <?xml version="1.0"?>
    <clickhouse>
      <prometheus>
        <endpoint>/metrics</endpoint>
        <port>9363</port>
        <metrics>true</metrics>
        <events>true</events>
        <asynchronous_metrics>true</asynchronous_metrics>
        <errors>true</errors>
      </prometheus>
    </clickhouse>
