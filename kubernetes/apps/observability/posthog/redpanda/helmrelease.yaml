---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: posthog-redpanda
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  driftDetection:
    mode: enabled
  values:
    controllers:
      redpanda:
        type: statefulset
        containers:
          app:
            image:
              repository: docker.redpanda.com/redpandadata/redpanda
              tag: v25.3.14
              pullPolicy: IfNotPresent
            command:
              - redpanda
            args:
              - start
              - --kafka-addr=internal://0.0.0.0:9092
              - --advertise-kafka-addr=internal://posthog-redpanda.observability.svc.cluster.local:9092
              - --rpc-addr=0.0.0.0:33145
              - --advertise-rpc-addr=posthog-redpanda.observability.svc.cluster.local:33145
              - --mode=dev-container
              - --smp=1
              - --memory=1G
              - --reserve-memory=200M
              - --overprovisioned
              - --seeds=posthog-redpanda.observability.svc.cluster.local:33145
              - --set=redpanda.empty_seed_starts_cluster=false
              - --set=redpanda.auto_create_topics_enabled=true
            env:
              ALLOW_PLAINTEXT_LISTENER: "true"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/status/ready
                    port: 9644
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/status/ready
                    port: 9644
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 6
            ports:
              - name: kafka
                containerPort: 9092
                protocol: TCP
              - name: rpc
                containerPort: 33145
                protocol: TCP
              - name: admin
                containerPort: 9644
                protocol: TCP
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 2Gi
    persistence:
      data:
        enabled: true
        accessMode: ReadWriteOnce
        size: 20Gi
        storageClass: openebs-hostpath
        globalMounts:
          - path: /var/lib/redpanda/data
    service:
      redpanda:
        controller: redpanda
        ports:
          kafka:
            port: 9092
          rpc:
            port: 33145
          admin:
            port: 9644
