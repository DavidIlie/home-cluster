---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: posthog
  namespace: observability
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  driftDetection:
    # warn (not enabled) — log drift in HR conditions but don't auto re-apply.
    # Re-applying with strategy: RollingUpdate is still safe, but we don't want
    # spurious unrelated kustomization reconciles to churn the deployment.
    mode: warn
  values:
    controllers:
      web:
        annotations:
          reloader.stakater.com/auto: "true"
        # Rolling update with maxUnavailable=0 keeps the old web pod serving
        # until the new one passes readiness — zero-downtime rolls. Web is
        # stateless (Django + nginx-unit), so concurrent old+new is fine.
        strategy: RollingUpdate
        rollingUpdate:
          unavailable: 0
          surge: 1
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3
            envFrom: &envFrom
              - secretRef:
                  name: posthog-secret
              - configMapRef:
                  name: posthog-envs
          migrate:
            image: &posthogImage
              repository: posthog/posthog
              tag: latest@sha256:c43c3b2c03b353bb7e2c48e337f768e853735dbd2f9b6b99908a4429a3dd3a4a
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
              - |
                set -eux
                python manage.py migrate
                python manage.py migrate_clickhouse
            envFrom: *envFrom
            resources:
              requests:
                cpu: 2000m
                memory: 2Gi
              limits:
                memory: 4Gi
        containers:
          app:
            image: *posthogImage
            command: ["./bin/docker-server"]
            env:
              # Web must NOT run async migrations scheduler (worker does).
              SKIP_ASYNC_MIGRATIONS_SETUP: "1"
              # ONE unit worker only. Multiple workers all fork-of-import
              # Django simultaneously, saturating CPU and stretching cold
              # start past the startup probe budget — pod gets liveness-
              # killed mid-boot in a loop. One worker means one boot;
              # /_health serves as soon as Django is up.
              NGINX_UNIT_APP_PROCESSES: "1"
              NGINX_UNIT_PRELOAD_CONFIG: "true"
            envFrom: *envFrom
            probes:
              # Tolerant probes — Django can stall briefly on slow outbound
              # calls (Stripe OAuth scan, etc.) without getting reaped.
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 8000
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 15
                  failureThreshold: 20
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 8000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 12
              # Startup deliberately generous: 20 * 10s + 60s = 4-5 min budget
              # per cold boot. With only 1 unit worker we should clear it well
              # before that, but Stripe sync activity can transiently make
              # /_health slow even after boot.
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 8000
                  initialDelaySeconds: 90
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 80
            # No memory cap — node is beefy, let posthog burst freely.
            # Request kept modest so the pod schedules on a node that's
            # already heavily committed; bursts use spare CPU/RAM.
            resources:
              requests:
                cpu: 1500m
                memory: 2Gi
      worker:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image: *posthogImage
            command: ["./bin/docker-worker-celery", "--with-scheduler"]
            env:
              # Worker owns async-migrations scheduler; auto-run on boot.
              SKIP_ASYNC_MIGRATIONS_SETUP: "0"
              AUTO_START_ASYNC_MIGRATIONS: "1"
            envFrom: *envFrom
            # No cap — celery memory grows with task variety (async migrations,
            # batch exports, hog functions); let it use the box.
            resources:
              requests:
                cpu: 1000m
                memory: 3Gi
      plugins:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: posthog/posthog-node
              tag: latest@sha256:863e76e040ad41aef79f605c33ec71f1529bddf94cfd88941c935da9bde97235
              pullPolicy: IfNotPresent
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 6738
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 6738
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            ports:
              - name: http
                containerPort: 6738
                protocol: TCP
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
      # Two queues only — matches what we actually use:
      #   - general-purpose-task-queue: deletion, usage, enrichment, analytics
      #   - data-warehouse-task-queue: source syncs (Stripe, Postgres, etc.)
      # Single pod, single replica. Earlier multi-queue / multi-replica
      # attempts caused churn that killed in-flight workflows before they
      # could call validate_schema_and_update_table — orphaning parquet in
      # MinIO without DataWarehouseTable rows registered.
      temporal-worker:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        containers:
          general:
            image: *posthogImage
            command: ["./bin/temporal-django-worker"]
            env:
              TEMPORAL_TASK_QUEUE: general-purpose-task-queue
              PROMETHEUS_METRICS_EXPORT_PORT: "8001"
            envFrom: *envFrom
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
          warehouse:
            image: *posthogImage
            command: ["./bin/temporal-django-worker"]
            env:
              TEMPORAL_TASK_QUEUE: data-warehouse-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8002"
            envFrom: *envFrom
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      tmp:
        enabled: true
        type: emptyDir
        advancedMounts:
          web:
            app:
              - path: /tmp
            migrate:
              - path: /tmp
          worker:
            app:
              - path: /tmp
          plugins:
            app:
              - path: /tmp
          temporal-worker:
            general:
              - path: /tmp
            warehouse:
              - path: /tmp
      geoip:
        existingClaim: geoip-nfs
        globalMounts:
          - path: /share/GeoIP
            readOnly: true
    service:
      web:
        controller: web
        ports:
          http:
            port: 8000
      plugins:
        controller: plugins
        ports:
          http:
            port: 6738
    ingress:
      app:
        enabled: true
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: "external.davidhome.ro"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Monitoring
          gethomepage.dev/name: PostHog
          gethomepage.dev/icon: posthog.png
          gethomepage.dev/description: Product Analytics
          gatus.home-operations.com/endpoint: |-
            name: PostHog
            group: Monitoring
            url: https://posthog.davidapps.dev/_health
            interval: 1m
            conditions: ["[STATUS] == 200"]
          nginx.ingress.kubernetes.io/proxy-body-size: "100m"
          nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
        hosts:
          - host: &host posthog.davidapps.dev
            paths:
              - path: /
                service:
                  identifier: web
                  port: http
        tls:
          - hosts: [*host]
