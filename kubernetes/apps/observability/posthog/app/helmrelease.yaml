---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: posthog
  namespace: observability
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  driftDetection:
    # warn (not enabled) — log drift in HR conditions but don't auto re-apply.
    # Re-applying with strategy: RollingUpdate is still safe, but we don't want
    # spurious unrelated kustomization reconciles to churn the deployment.
    mode: warn
  values:
    controllers:
      web:
        annotations:
          reloader.stakater.com/auto: "true"
        # Rolling update with maxUnavailable=0 keeps the old web pod serving
        # until the new one passes readiness — zero-downtime rolls. Web is
        # stateless (Django + nginx-unit), so concurrent old+new is fine.
        strategy: RollingUpdate
        rollingUpdate:
          unavailable: 0
          surge: 1
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3
            envFrom: &envFrom
              - secretRef:
                  name: posthog-secret
              - configMapRef:
                  name: posthog-envs
          migrate:
            image: &posthogImage
              repository: posthog/posthog
              tag: latest@sha256:3c503b47b28107109f3ad9fda9ff82de32351cb18bd11493482eab1edfae20c4
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
              - |
                set -eux
                python manage.py migrate
                python manage.py migrate_clickhouse
            envFrom: *envFrom
            resources:
              requests:
                cpu: 2000m
                memory: 2Gi
              limits:
                memory: 4Gi
        containers:
          app:
            image: *posthogImage
            command: ["./bin/docker-server"]
            env:
              # Web must NOT run async migrations scheduler (worker does).
              SKIP_ASYNC_MIGRATIONS_SETUP: "1"
              # 4 unit workers: 2 was bottlenecking — when both got tied up
              # on a slow outbound call (Stripe OAuth, etc.) /_health queued
              # behind them and kubelet killed the pod. With preload, extra
              # workers are cheap (fork from prototype, no repeat imports).
              NGINX_UNIT_APP_PROCESSES: "4"
              # Preload Django in the unit prototype, then fork workers from it
              # — subsequent workers are ~instant instead of repeating the full
              # import. Cold-start stays fast even at 4 workers.
              NGINX_UNIT_PRELOAD_CONFIG: "true"
            envFrom: *envFrom
            probes:
              # Liveness deliberately tolerant — slow outbound integrations
              # (Stripe OAuth scan, etc.) can pin workers for a minute.
              # 30s period * 20 failures = 10 min before kubelet kills.
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 8000
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 15
                  failureThreshold: 20
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 8000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 12
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 8000
                  initialDelaySeconds: 60
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 60
            # No memory cap — node is beefy, let posthog burst freely.
            # Request kept modest so the pod schedules on a node that's
            # already heavily committed; bursts use spare CPU/RAM.
            resources:
              requests:
                cpu: 1500m
                memory: 2Gi
      worker:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image: *posthogImage
            command: ["./bin/docker-worker-celery", "--with-scheduler"]
            env:
              # Worker owns async-migrations scheduler; auto-run on boot.
              SKIP_ASYNC_MIGRATIONS_SETUP: "0"
              AUTO_START_ASYNC_MIGRATIONS: "1"
            envFrom: *envFrom
            # No cap — celery memory grows with task variety (async migrations,
            # batch exports, hog functions); let it use the box.
            resources:
              requests:
                cpu: 1000m
                memory: 3Gi
      plugins:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: posthog/posthog-node
              tag: latest@sha256:863e76e040ad41aef79f605c33ec71f1529bddf94cfd88941c935da9bde97235
              pullPolicy: IfNotPresent
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 6738
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 6738
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            ports:
              - name: http
                containerPort: 6738
                protocol: TCP
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
      # PostHog routes Temporal workflows across many task queues; each must
      # have a worker subscribed or workflows queue forever. start_temporal_worker
      # only listens on one queue at a time, so we run one container per queue
      # in a single pod (cheaper than one Deployment per queue — shared kernel
      # + image cache, single PVC mount, single rollout cycle).
      #
      # Queues skipped on purpose:
      #   - billing-task-queue:        cloud-only (BILLING_SERVICE_URL unset)
      #   - ducklake-task-queue:       experimental
      #   - llma-*-task-queue:         LLM analytics product, not in use
      #   - event-screenshots / logs-alerting: niche / cloud
      #   - no-sandbox-python-django:  sync batch exports, rarely used
      # Light queues — one replica is fine, all of these are low-volume.
      # data-warehouse-task-queue (the heavy one) is split out into its own
      # controller below so we can scale it independently.
      temporal-worker:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: RollingUpdate
        rollingUpdate:
          unavailable: 0
          surge: 1
        containers:
          # All containers share the pod network namespace, so each must bind
          # a unique PROMETHEUS_METRICS_EXPORT_PORT (Temporal Rust SDK starts a
          # Prometheus exporter regardless of TEMPORAL_COMBINED_METRICS_SERVER_ENABLED).
          # Default 8001 → assign 8001-8012.
          #
          # Core "anything else" queue: deletion, usage, enrichment, analytics,
          # hog flow workflows. Keeps the combined metrics server (Python +
          # Rust merged on 8001) for Prometheus scraping.
          general: &temporalWorker
            image: *posthogImage
            command: ["./bin/temporal-django-worker"]
            env:
              TEMPORAL_TASK_QUEUE: general-purpose-task-queue
              PROMETHEUS_METRICS_EXPORT_PORT: "8001"
            envFrom: *envFrom
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
          # Warehouse → CDP pipeline producer.
          cdp:
            <<: *temporalWorker
            env:
              TEMPORAL_TASK_QUEUE: data-warehouse-cdp-producer-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8003"
          # Scheduled batch exports (S3 / BigQuery / Snowflake destinations).
          batch-exports:
            <<: *temporalWorker
            env:
              TEMPORAL_TASK_QUEUE: batch-exports-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8004"
          # Data import signals (used by warehouse + video exports). Required
          # for warehouse sync workflows to receive lifecycle signals.
          video-export:
            <<: *temporalWorker
            env:
              TEMPORAL_TASK_QUEUE: video-export-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8005"
          # Insight alerts, subscriptions, scheduled exports of insights.
          analytics-platform:
            <<: *temporalWorker
            env:
              TEMPORAL_TASK_QUEUE: analytics-platform-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8006"
          # Web analytics + messaging (broadcasts, campaigns).
          messaging:
            <<: *temporalWorker
            env:
              TEMPORAL_TASK_QUEUE: messaging-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8007"
          # Session replay processing.
          session-replay:
            <<: *temporalWorker
            env:
              TEMPORAL_TASK_QUEUE: session-replay-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8008"
          # Tasks feature.
          tasks:
            <<: *temporalWorker
            env:
              TEMPORAL_TASK_QUEUE: tasks-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8009"
          # Weekly digest emails.
          weekly-digest:
            <<: *temporalWorker
            env:
              TEMPORAL_TASK_QUEUE: weekly-digest-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8010"
          # Health check workflows.
          health-check:
            <<: *temporalWorker
            env:
              TEMPORAL_TASK_QUEUE: health-check-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8011"
          # Max AI assistant workflows.
          max-ai:
            <<: *temporalWorker
            env:
              TEMPORAL_TASK_QUEUE: max-ai-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8012"
      # Dedicated controller for the heavy data-warehouse-task-queue.
      # 4 replicas × MAX_CONCURRENT_ACTIVITIES=2 (from configmap) = 8 in-flight
      # warehouse syncs, each with its own dedicated Python process / asyncio
      # event loop. This is the right way to scale the warehouse work — adding
      # more activities to one process just causes heartbeat starvation when
      # the deltalake write blocks the loop.
      temporal-worker-warehouse:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 4
        strategy: RollingUpdate
        rollingUpdate:
          unavailable: 0
          surge: 1
        containers:
          app:
            image: *posthogImage
            command: ["./bin/temporal-django-worker"]
            env:
              TEMPORAL_TASK_QUEUE: data-warehouse-task-queue
              TEMPORAL_COMBINED_METRICS_SERVER_ENABLED: "false"
              PROMETHEUS_METRICS_EXPORT_PORT: "8001"
            envFrom: *envFrom
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      tmp:
        enabled: true
        type: emptyDir
        advancedMounts:
          web:
            app:
              - path: /tmp
            migrate:
              - path: /tmp
          worker:
            app:
              - path: /tmp
          plugins:
            app:
              - path: /tmp
          temporal-worker:
            general:
              - path: /tmp
            cdp:
              - path: /tmp
            batch-exports:
              - path: /tmp
            video-export:
              - path: /tmp
            analytics-platform:
              - path: /tmp
            messaging:
              - path: /tmp
            session-replay:
              - path: /tmp
            tasks:
              - path: /tmp
            weekly-digest:
              - path: /tmp
            health-check:
              - path: /tmp
            max-ai:
              - path: /tmp
          temporal-worker-warehouse:
            app:
              - path: /tmp
      geoip:
        existingClaim: geoip-nfs
        globalMounts:
          - path: /share/GeoIP
            readOnly: true
    service:
      web:
        controller: web
        ports:
          http:
            port: 8000
      plugins:
        controller: plugins
        ports:
          http:
            port: 6738
    ingress:
      app:
        enabled: true
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: "external.davidhome.ro"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Monitoring
          gethomepage.dev/name: PostHog
          gethomepage.dev/icon: posthog.png
          gethomepage.dev/description: Product Analytics
          gatus.home-operations.com/endpoint: |-
            name: PostHog
            group: Monitoring
            url: https://posthog.davidapps.dev/_health
            interval: 1m
            conditions: ["[STATUS] == 200"]
          nginx.ingress.kubernetes.io/proxy-body-size: "100m"
          nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
        hosts:
          - host: &host posthog.davidapps.dev
            paths:
              - path: /
                service:
                  identifier: web
                  port: http
        tls:
          - hosts: [*host]
