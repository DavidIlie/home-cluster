---
apiVersion: v1
kind: ConfigMap
metadata:
  name: posthog-envs
  namespace: observability
data:
  SITE_URL: https://posthog.davidapps.dev
  DEPLOYMENT: hobby
  IS_BEHIND_PROXY: "true"
  TRUST_ALL_PROXIES: "true"
  DISABLE_SECURE_SSL_REDIRECT: "true"
  USE_GRANIAN: "true"
  GRANIAN_WORKERS: "2"
  POSTHOG_SKIP_MIGRATION_CHECKS: "1"
  OTEL_SDK_DISABLED: "true"
  OPT_OUT_CAPTURE: "false"
  CLICKHOUSE_HOST: posthog-clickhouse.observability.svc.cluster.local
  CLICKHOUSE_CLUSTER: posthog
  CLICKHOUSE_SECURE: "false"
  CLICKHOUSE_VERIFY: "false"
  REDIS_URL: redis://dragonfly.databases.svc.cluster.local:6379/
  CDP_REDIS_HOST: dragonfly.databases.svc.cluster.local
  CDP_REDIS_PORT: "6379"
  KAFKA_HOSTS: posthog-redpanda.observability.svc.cluster.local:9092
  KAFKA_PRODUCER_METADATA_BROKER_LIST: posthog-redpanda.observability.svc.cluster.local:9092
  KAFKA_CONSUMER_METADATA_BROKER_LIST: posthog-redpanda.observability.svc.cluster.local:9092
  KAFKA_CDP_PRODUCER_METADATA_BROKER_LIST: posthog-redpanda.observability.svc.cluster.local:9092
  KAFKA_WAREHOUSE_PRODUCER_METADATA_BROKER_LIST: posthog-redpanda.observability.svc.cluster.local:9092
  LOGS_REDIS_HOST: dragonfly.databases.svc.cluster.local
  LOGS_REDIS_PORT: "6379"
  LOGS_REDIS_TLS: "false"
  TRACES_REDIS_HOST: dragonfly.databases.svc.cluster.local
  TRACES_REDIS_PORT: "6379"
  TRACES_REDIS_TLS: "false"
  OBJECT_STORAGE_ENABLED: "true"
  OBJECT_STORAGE_ENDPOINT: http://192.168.100.63:9000
  OBJECT_STORAGE_PUBLIC_ENDPOINT: https://posthog.davidapps.dev
  OBJECT_STORAGE_BUCKET: posthog
  SESSION_RECORDING_V2_S3_ENDPOINT: http://192.168.100.63:9000
  SESSION_RECORDING_V2_S3_BUCKET: posthog
  RECORDING_API_URL: http://posthog-plugins.observability.svc.cluster.local:6738
  CDP_API_URL: http://posthog-plugins.observability.svc.cluster.local:6738
  INIT_POSTGRES_HOST: postgres17-rw.databases.svc.cluster.local
  INIT_POSTGRES_DBNAME: posthog
  INIT_POSTGRES_USER: posthog
  INIT_POSTGRES_SUPER_USER: postgres
  # Cap celery worker forks to keep memory bounded on small cluster.
  WEB_CONCURRENCY: "2"
  CELERY_MAX_TASKS_PER_CHILD: "100"
  CELERY_MAX_MEMORY_PER_CHILD: "1500000"
  CELERY_WORKER_PREFETCH_MULTIPLIER: "1"
  # MMDB GeoIP (populated by geoipupdate sidecar into /share/GeoIP)
  MMDB_FILE_LOCATION: /share/GeoIP/GeoLite2-City.mmdb
  # Temporal (batch exports + data warehouse workflows)
  TEMPORAL_HOST: posthog-temporal-frontend.observability.svc.cluster.local
  TEMPORAL_PORT: "7233"
  TEMPORAL_NAMESPACE: default
  TEMPORAL_TASK_QUEUE: general-purpose-task-queue
