apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: plausible-clickhouse
  namespace: dev
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 1.5.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    controller:
      type: statefulset
    image:
      repository: yandex/clickhouse-server
      tag: latest
    env:
      TZ: ${TIMEZONE}
    envFrom:
      - secretRef:
          name: plausible-secret
    service:
      main:
        ports:
          http:
            port: 8123
    volumeClaimTemplates:
      - name: config
        mountPath: /var/lib/clickhouse
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: ceph-block
    persistence:
      config:
        enabled: true
        type: configMap
        name: plausible-events-db-config
        mountPath: /etc/clickhouse-server/config.d/logging.xml
        subPath: clickhouse-config.xml
        readOnly: true
      configuser:
        enabled: true
        type: configMap
        name: plausible-events-db-config
        mountPath: /etc/clickhouse-server/users.d/logging.xml
        subPath: clickhouse-user-config.xml
        readOnly: true
