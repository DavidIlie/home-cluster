---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bernd-schorgers/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundcube
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      roundcube:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/roundcube/roundcubemail
              tag: 1.7.2-apache
            env:
              TZ: Europe/Bucharest
              ROUNDCUBEMAIL_DEFAULT_HOST: ssl://192.168.100.95
              ROUNDCUBEMAIL_DEFAULT_PORT: "993"
              ROUNDCUBEMAIL_SMTP_SERVER: tls://192.168.100.95
              ROUNDCUBEMAIL_SMTP_PORT: "587"
              ROUNDCUBEMAIL_SKIN: elastic
              ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE: 25M
              ROUNDCUBEMAIL_DB_TYPE: sqlite
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
    service:
      app:
        controller: roundcube
        ports:
          http:
            port: 80
    ingress:
      app:
        className: external
        annotations:
          gethomepage.dev/enabled: "false"
          gatus.home-operations.com/endpoint: |-
            name: Roundcube
            group: Utilities
            url: https://mail.davidapps.dev
            interval: 1m
            conditions: ["[STATUS] == 200"]
        hosts:
          - host: "mail.davidapps.dev"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      data:
        existingClaim: roundcube
        globalMounts:
          - path: /var/roundcube/db
