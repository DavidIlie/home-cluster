---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gokapi
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      gokapi:
        containers:
          app:
            image:
              repository: docker.io/f0rc3/gokapi
              tag: v2.2.2
            env:
              TZ: Europe/Bucharest
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    service:
      app:
        controller: gokapi
        ports:
          http:
            port: 53842
    persistence:
      storage:
        type: nfs
        server: 192.168.25.3
        path: /mnt/data/share/client_user/kubernetes/gokapi
        globalMounts:
          - path: /app/config
            subPath: config
          - path: /app/data
            subPath: data
