---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-speedtest
  namespace: flux-system
spec:
  dependsOn:
    - name: cluster-apps-redis-lb
    - name: cluster-apps-cloudnative-pg-cluster
    - name: cluster-apps-rook-ceph
  path: ./kubernetes/apps/default/speedtest/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta1
      kind: HelmRelease
      name: personal-dashboard
      namespace: default
  interval: 15m
  retryInterval: 1m
  timeout: 30s
