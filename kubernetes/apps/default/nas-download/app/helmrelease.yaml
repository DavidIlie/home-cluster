---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: nas-download
spec:
  interval: 30m
  chart:
    spec:
      chart: nginx
      version: 2.18.0
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      repository: nginx
      tag: latest
    replicaCount: 1
    service:
      type: ClusterIP
      ports:
        - port: 80
          targetPort: http
    ingress:
      enabled: true
      ingressClassName: external
      annotations:
        external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
      hosts:
        - host: dl.${SECRET_DOMAIN}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - dl.${SECRET_DOMAIN}
    config:
      defaultServerBlock: |
        server {
          listen 80;
          server_name dl.${SECRET_DOMAIN};

          location / {
              root /data;
              autoindex on;
              autoindex_exact_size off;
              autoindex_localtime on;
          }
        }
    persistence:
      config:
        type: nfs
        server: 192.168.25.3
        path: /mnt/data/share/dl_facing
        globalMounts:
          - path: /data
