# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nas-download
spec:
  chart:
    spec:
      chart: app-template
      version: 3.4.0
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bernd-schorgers
  interval: 30m
  values:
    controllers:
      nginx:
        type: statefulset
        containers:
          app:
            image:
              repository: nginx
              tag: latest
              pullPolicy: IfNotPresent
            args:
              - nginx
              - -g
              - daemon off;
        pod:
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            fsGroup: 101
    service:
      nginx:
        controller: nginx
        ports:
          http:
            port: 80
    ingress:
      public:
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
        hosts:
          - host: dl.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - dl.${SECRET_DOMAIN}
    persistence:
      data:
        enabled: true
        type: nfs
        server: 192.168.25.3
        path: /mnt/data/share/dl_facing
        globalMounts:
          - path: /data
    configMaps:
      nginx-config:
        enabled: true
        data:
          nginx.conf: |
            server {
                listen 80;
                server_name dl.${SECRET_DOMAIN};

                location / {
                    root /data;
                    autoindex on;
                    autoindex_exact_size off;
                    autoindex_localtime on;
                }
            }
