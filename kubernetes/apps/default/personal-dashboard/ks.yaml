---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-personal-dasboard
  namespace: flux-system
spec:
  path: ./kubernetes/apps/default/personal-dasboard/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta1
      kind: HelmRelease
      name: personal-dasboard
      namespace: default
  interval: 30m
  retryInterval: 1m
  timeout: 3m
