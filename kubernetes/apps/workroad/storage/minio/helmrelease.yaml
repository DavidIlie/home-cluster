---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: workroad-minio
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.4.0
      sourceRef:
        kind: HelmRepository
        name: bernd-schorgers
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      minio:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/minio/minio
              tag: RELEASE.2024-06-29T01-20-47Z@sha256:fce0a90a37bb2887c850b68b61a0ac8ac02ea218b58eaea96bb7ca69eb503e20
            args:
              - server
              - /data
              - --console-address
              - :9001
            env:
              TZ: Europe/Bucharest
              MINIO_UPDATE: "off"
              MINIO_BROWSER_REDIRECT: "false"
              MINIO_BROWSER_REDIRECT_URL: https://minio-workroad.davidpps.dev
              MINIO_SERVER_URL: https://cdn.workroad.app
              MINIO_API_CORS_ALLOW_ORIGIN: "*"
            envFrom:
              - secretRef:
                  name: minio-workroad-secret
            resources:
              requests:
                cpu: 5m
                memory: 128M
            securityContext:
              privileged: true
              runAsUser: 0
    service:
      app:
        controller: minio
        ports:
          http:
            port: 9001
          s3:
            port: 9000
    ingress:
      s3:
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
          nginx.ingress.kubernetes.io/proxy-body-size: 150m
        hosts:
          - host: &cdn "cdn.workroad.app"
            paths:
              - path: /
                service:
                  identifier: app
                  port: s3
      dashboard:
        className: internal
        hosts:
          - host: &minio "minio-workroad.davidapps.dev"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *cdn
              - *minio
    persistence:
      config:
        type: nfs
        server: 192.168.25.3
        path: /mnt/ssds/workroad-minio
        globalMounts:
          - path: /data
