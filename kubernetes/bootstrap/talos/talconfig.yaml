# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.7.5
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.30.3

clusterName: "romania-kube"
endpoint: https://192.168.100.69:6443
clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"
additionalApiServerCertSans: &sans
  - "192.168.100.69"
  - 127.0.0.1 # KubePrism
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "kube-01"
    ipAddress: "192.168.100.84"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/installer/ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:1d:dd:bf"
        dhcp: false
        addresses:
          - "192.168.100.84/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.100.1"
        mtu: 1500
        vip:
          ip: "192.168.100.69"
      - deviceSelector:
          hardwareAddr: "bc:24:11:c0:f4:28"
        dhcp: false
        addresses:
          - "192.168.25.5/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.25.1"
        mtu: 1500
  - hostname: "kube-02"
    ipAddress: "192.168.100.85"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/installer/ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:e8:f2:09"
        dhcp: false
        addresses:
          - "192.168.100.85/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.100.1"
        mtu: 1500
        vip:
          ip: "192.168.100.69"
      - deviceSelector:
          hardwareAddr: "bc:24:11:2f:72:c9"
        dhcp: false
        addresses:
          - "192.168.25.6/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.25.1"
        mtu: 1500
  - hostname: "kube-03"
    ipAddress: "192.168.100.86"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/installer/ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:99:7d:eb"
        dhcp: false
        addresses:
          - "192.168.100.86/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.100.1"
        mtu: 1500
        vip:
          ip: "192.168.100.69"
      - deviceSelector:
          hardwareAddr: "bc:24:11:35:db:15"
        dhcp: false
        addresses:
          - "192.168.25.7/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.25.1"
        mtu: 1500

# Global patches
patches:
  - # Force nameserver
    |-
    machine:
      network:
        nameservers:
          - 192.168.100.1
          - 1.1.1.1
  - "@./patches/global/cluster-discovery.yaml"
  - "@./patches/global/containerd.yaml"
  - "@./patches/global/disable-search-domain.yaml"
  - "@./patches/global/hostdns.yaml"
  - "@./patches/global/kubelet.yaml"
  - "@./patches/global/openebs-local.yaml"
  - "@./patches/global/sysctl.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/api-access.yaml"
    - "@./patches/controller/cluster.yaml"
    - "@./patches/controller/disable-admission-controller.yaml"
    - "@./patches/controller/etcd.yaml"

